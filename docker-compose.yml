version: '3.8'

services:
  chatbot:
    build: .
    container_name: college-chatbot
    ports:
      - "8001:8001"
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
